name: Quarto Publish

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: latest

      - name: Install Python and dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python packages
        run: |
          pip install jupyter pandas numpy matplotlib seaborn scikit-learn statsmodels openpyxl

      - name: Debug - List files
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== Report directory ==="
          ls -la report/
          echo "=== Quarto version ==="
          quarto --version

      - name: Render Quarto
        run: |
          quarto render report/reproducibility_report.qmd --to html --output output

      - name: Debug - Check output
        run: |
          ls -la output/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
